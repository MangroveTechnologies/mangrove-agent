name: 1inch Router Allowlist Watcher

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:       # Manual trigger from the Actions tab

jobs:
  check-routers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write   # needed to open the alert issue
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for new 1inch router deployments
        id: check
        run: python .github/scripts/check_1inch_routers.py

      - name: Open GitHub issue if new router detected
        if: steps.check.outputs.new_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Deduplicate — skip if an open alert issue already exists.
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'audit-finding',
              per_page: 50,
            });
            const alreadyOpen = open.some(i =>
              i.title.toLowerCase().includes('update _oneinch_routers')
            );
            if (alreadyOpen) {
              core.info('Alert issue already open — skipping creation.');
              return;
            }

            const body = fs.readFileSync('/tmp/1inch-router-alert.md', 'utf8');
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ New 1inch router version detected — update _ONEINCH_ROUTERS',
              body,
              labels: ['audit-finding'],
            });
            core.info(`Created issue #${issue.number}: ${issue.html_url}`);

      - name: Open GitHub issue if scan data source is broken
        if: steps.check.outputs.scan_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Deduplicate — skip if a watcher-broken issue is already open.
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'audit-finding',
              per_page: 50,
            });
            const alreadyOpen = open.some(i =>
              i.title.toLowerCase().includes('1inch') &&
              i.title.toLowerCase().includes('watcher')
            );
            if (alreadyOpen) {
              core.info('Watcher-broken issue already open — skipping creation.');
              return;
            }

            const body = [
              '## 1inch router watcher is blind — manual check required',
              '',
              'The weekly watcher ran but could not verify the scan results:',
              'none of the known `_ONEINCH_ROUTERS` addresses were found in the',
              '`@1inch/fusion-sdk` npm package.',
              '',
              'This means the package has been restructured or renamed and the',
              'automated check is no longer reliable. **Until this is fixed, new',
              '1inch router versions will not be detected automatically.**',
              '',
              '### Required action',
              '',
              '1. Check whether `@1inch/fusion-sdk` still exists on npm and still',
              '   contains router addresses.',
              '2. If the package was renamed or restructured, update `NPM_CANDIDATES`',
              '   in `.github/scripts/check_1inch_routers.py`.',
              '3. Manually verify no new 1inch AggregationRouter has been deployed',
              '   since the last successful scan.',
              '',
              '_Generated by `.github/workflows/1inch-router-watcher.yml`_',
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 1inch router watcher broken — manual verification needed',
              body,
              labels: ['audit-finding'],
            });
            core.info(`Created issue #${issue.number}: ${issue.html_url}`);
