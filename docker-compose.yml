services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mangrove-agent
    ports:
      # Host 9080 -> container 8080. Some host environments (VSCode's
      # helper, other dev tools) grab :8080 — binding 9080 externally
      # sidesteps that while keeping the container's internal port
      # standard.
      - "9080:8080"
    environment:
      - ENVIRONMENT=local
    volumes:
      # Durable agent state (SQLite DB + Fernet master key) as a directory
      # mount. Single-file bind mounts on macOS/Windows drift between host
      # and container — directory mounts don't. Everything that must
      # survive a rebuild lives under agent-data/.
      - ./agent-data/:/app/agent-data/
      - ./server/src/config/local-config.json:/app/src/config/local-config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
